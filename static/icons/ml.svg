  <text x="110" y="390" font-size="38" text-anchor="middle" fill="rgba(255,255,255,0.22)" font-family="serif">♡</text>
  <text x="430" y="380" font-size="28" text-anchor="middle" fill="rgba(255,255,255,0.20)" font-family="serif">♡</text>

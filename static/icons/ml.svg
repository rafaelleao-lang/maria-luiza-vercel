<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff85c8"/>
      <stop offset="100%" stop-color="#c2007e"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="30%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Fundo cheio (maskable: conteúdo principal dentro da safe zone circular ~80%) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Brilho suave superior -->
  <rect width="512" height="512" fill="url(#shine)"/>
  <!-- Círculo decorativo interno leve -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Coração decorativo superior direito -->
  <text x="394" y="140" font-size="50" text-anchor="middle" fill="rgba(255,255,255,0.38)" font-family="Georgia,serif">♡</text>
  <!-- Coração pequeno inferior esquerdo -->
  <text x="110" y="416" font-size="30" text-anchor="middle" fill="rgba(255,255,255,0.20)" font-family="Georgia,serif">♡</text>
  <!-- Texto ML — fonte serif elegante, branco -->
  <text
    x="256"
    y="310"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="196"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    letter-spacing="-5"
    opacity="0.97">ML</text>
  <!-- Linha decorativa abaixo do texto -->
  <rect x="162" y="340" width="188" height="3" rx="1.5" fill="rgba(255,255,255,0.48)"/>
  <!-- Pontinhos rítmicos -->
  <circle cx="246" cy="362" r="3.5" fill="rgba(255,255,255,0.32)"/>
  <circle cx="262" cy="362" r="3.5" fill="rgba(255,255,255,0.32)"/>
  <circle cx="278" cy="362" r="3.5" fill="rgba(255,255,255,0.32)"/>
</svg>
